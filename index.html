<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IAninha — Modern English Tutor</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root {
      --bg: #0f172a;
      --surface: rgba(30, 41, 59, 0.7);
      --surface-hover: rgba(30, 41, 59, 0.9);
      --border: rgba(255, 255, 255, 0.1);
      --border-focus: rgba(139, 92, 246, 0.5);
      --text: #f8fafc;
      --text-muted: #94a3b8;
      --primary: #8b5cf6;
      --primary-hover: #7c3aed;
      --secondary: #06b6d4;
      --accent: #f43f5e;
      --chat-user: linear-gradient(135deg, #8b5cf6, #6d28d9);
      --chat-ai: rgba(30, 41, 59, 0.8);
      --tip-bg: rgba(245, 158, 11, 0.1);
      --tip-border: rgba(245, 158, 11, 0.3);
      --tip-text: #fcd34d;
      --danger: #ef4444;
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Background Animations */
    .bg-blobs { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; pointer-events: none; }
    .blob { position: absolute; filter: blur(100px); border-radius: 50%; animation: float 10s infinite alternate ease-in-out; opacity: 0.4; }
    .blob-1 { width: 500px; height: 500px; background: var(--primary); top: -200px; left: -100px; animation-delay: 0s; }
    .blob-2 { width: 400px; height: 400px; background: var(--secondary); bottom: -100px; right: -100px; animation-delay: -5s; }
    .blob-3 { width: 300px; height: 300px; background: var(--accent); top: 40%; left: 50%; animation-delay: -2s; transform: translate(-50%, -50%); opacity: 0.2; }

    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 30px) scale(1.1); }
    }

    h1, h2, h3, h4 { font-family: 'Outfit', sans-serif; }

    /* Button Reset */
    button { font-family: 'Inter', sans-serif; border: none; cursor: pointer; outline: none; }

    /* Setup Screen */
    #setup-screen {
      position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
      padding: 24px; z-index: 50; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(16px);
      transition: opacity 0.4s; overflow-y: auto;
    }
    .setup-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 24px;
      padding: 40px; width: 100%; max-width: 480px; margin: auto;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(20px);
    }
    .setup-header { text-align: center; margin-bottom: 32px; }
    .setup-avatar {
      width: 80px; height: 80px; border-radius: 50%; margin: 0 auto 16px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 30px rgba(139, 92, 246, 0.4);
    }
    .setup-avatar i { width: 40px; height: 40px; color: #fff; }
    .setup-header h1 { font-size: 28px; font-weight: 700; background: linear-gradient(to right, #fff, #cbd5e1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .setup-header p { color: var(--text-muted); margin-top: 8px; font-size: 15px; }

    .input-group { margin-bottom: 20px; }
    .input-group label { display: flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 500; margin-bottom: 8px; color: #e2e8f0; }
    .badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 12px; }
    .badge.groq { background: rgba(139, 92, 246, 0.2); color: #c4b5fd; border: 1px solid rgba(139, 92, 246, 0.3); }
    .badge.openrouter { background: rgba(234, 179, 8, 0.2); color: #fde047; border: 1px solid rgba(234, 179, 8, 0.3); }
    .badge.gemini { background: rgba(6, 182, 212, 0.2); color: #67e8f9; border: 1px solid rgba(6, 182, 212, 0.3); }
    
    .input-wrapper { position: relative; }
    .input-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); width: 18px; height: 18px; }
    .setup-input {
      width: 100%; background: rgba(15, 23, 42, 0.6); border: 1px solid var(--border);
      border-radius: 12px; padding: 14px 14px 14px 40px; color: var(--text);
      font-size: 15px; transition: all 0.2s;
    }
    .setup-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(139, 92, 246, 0.2); outline: none; }
    .setup-hint { font-size: 12px; color: var(--text-muted); margin-top: 8px; display: flex; align-items: center; gap: 4px; }
    .setup-hint a { color: var(--secondary); text-decoration: none; transition: color 0.2s; }
    .setup-hint a:hover { color: #22d3ee; text-decoration: underline; }

    .btn-primary {
      width: 100%; background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff; padding: 16px; border-radius: 14px; font-size: 16px; font-weight: 600;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 10px 20px -10px rgba(139, 92, 246, 0.6);
      margin-top: 24px;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 15px 25px -10px rgba(139, 92, 246, 0.8); }
    .btn-primary:active { transform: translateY(0); }

    /* App Screen */
    #app-screen { display: none; flex-direction: column; height: 100%; width: 100%; max-width: 1000px; margin: 0 auto; background: var(--surface); border-left: 1px solid var(--border); border-right: 1px solid var(--border); backdrop-filter: blur(20px); box-shadow: 0 0 40px rgba(0,0,0,0.3); }

    /* Header */
    header {
      padding: 16px 24px; display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border); background: rgba(15, 23, 42, 0.4); flex-shrink: 0;
    }
    .header-info { display: flex; align-items: center; gap: 16px; }
    .header-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 15px rgba(139, 92, 246, 0.3);
      position: relative; transition: all 0.3s;
    }
    .header-avatar.speaking {
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.3), 0 0 20px rgba(139, 92, 246, 0.8);
    }
    
    /* 2D Animated Avatar */
    .teacher-face {
      width: 100%; height: 100%; border-radius: 50%; position: relative;
      background: linear-gradient(135deg, #fde047, #f59e0b);
      overflow: hidden; border: 2px solid #fff;
    }
    .face-eye {
      width: 6px; height: 8px; background: #1e293b; border-radius: 50%;
      position: absolute; top: 40%; animation: blink-eyes 4s infinite;
    }
    .face-eye.left { left: 30%; }
    .face-eye.right { right: 30%; }
    .face-blush {
      width: 10px; height: 5px; background: #ef4444; border-radius: 50%;
      position: absolute; top: 52%; opacity: 0.4;
    }
    .face-blush.left { left: 18%; }
    .face-blush.right { right: 18%; }
    .face-mouth {
      width: 16px; height: 4px; background: #1e293b; border-radius: 10px;
      position: absolute; bottom: 25%; left: 50%; transform: translateX(-50%);
      transition: all 0.1s;
    }
    
    .header-avatar.speaking .face-mouth {
      animation: talk-mouth 0.3s infinite alternate;
    }

    @keyframes talk-mouth {
      0% { height: 4px; width: 16px; border-radius: 10px; }
      40% { height: 14px; width: 12px; border-radius: 50%; }
      80% { height: 8px; width: 18px; border-radius: 10px; }
      100% { height: 12px; width: 10px; border-radius: 40%; }
    }
    @keyframes blink-eyes {
      0%, 94%, 100% { transform: scaleY(1); }
      97% { transform: scaleY(0.1); }
    }

    .header-text h2 { font-size: 18px; font-weight: 600; margin-bottom: 2px; }
    .header-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--secondary); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--secondary); animation: blink 2s infinite; }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    
    .header-actions { display: flex; align-items: center; gap: 12px; }
    .btn-icon-text {
      display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); padding: 8px 12px; border-radius: 10px;
      color: var(--text-muted); font-size: 13px; font-weight: 500; transition: all 0.2s;
    }
    .btn-icon-text:hover { background: rgba(255,255,255,0.1); color: var(--text); }
    .btn-icon-text i { width: 14px; height: 14px; }

    /* Topics Section */
    #topics-section { flex: 1; overflow-y: auto; padding: 40px 24px; }
    .topics-header { text-align: center; margin-bottom: 40px; }
    .topics-header h3 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
    .topics-header p { color: var(--text-muted); font-size: 16px; }
    .topics-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; max-width: 800px; margin: 0 auto; }
    
    .topic-card {
      background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border);
      border-radius: 16px; padding: 24px; display: flex; flex-direction: column;
      align-items: center; text-align: center; gap: 16px; cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .topic-card:hover {
      background: rgba(255, 255, 255, 0.08); border-color: var(--primary);
      transform: translateY(-4px); box-shadow: 0 10px 25px -5px rgba(139, 92, 246, 0.2);
    }
    .topic-icon {
      width: 56px; height: 56px; border-radius: 16px; background: rgba(139, 92, 246, 0.1);
      color: var(--primary); display: flex; align-items: center; justify-content: center;
      transition: all 0.3s;
    }
    .topic-card:hover .topic-icon { background: var(--primary); color: #fff; transform: scale(1.1) rotate(5deg); }
    .topic-icon i { width: 28px; height: 28px; }
    .topic-card span { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 600; color: #e2e8f0; }

    /* Chat Section */
    #chat-section { display: none; flex-direction: column; flex: 1; overflow: hidden; position: relative; }
    .active-topic-bar {
      background: rgba(15, 23, 42, 0.8); border-bottom: 1px solid var(--border); flex-shrink: 0;
      padding: 10px 24px; display: flex; align-items: center; justify-content: center; gap: 8px;
      font-size: 13px; color: var(--text-muted); font-weight: 500;
    }
    .active-topic-bar i { width: 14px; height: 14px; color: var(--primary); }
    
    #messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 24px; scroll-behavior: smooth; }
    
    .msg-group { display: flex; gap: 16px; max-width: 85%; }
    .msg-group.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg-group.ai { align-self: flex-start; }
    
    .msg-avatar {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .msg-group.user .msg-avatar { background: linear-gradient(135deg, #3b82f6, #2dd4bf); color: #fff; }
    .msg-group.ai .msg-avatar { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: #fff; }
    .msg-avatar i { width: 18px; height: 18px; }

    .msg-content { display: flex; flex-direction: column; gap: 8px; }
    .msg-group.user .msg-content { align-items: flex-end; }
    .msg-group.ai .msg-content { align-items: flex-start; }

    .bubble {
      padding: 14px 18px; font-size: 15px; line-height: 1.6; border-radius: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1); white-space: pre-wrap;
    }
    .msg-group.user .bubble { background: var(--chat-user); color: #fff; border-bottom-right-radius: 4px; }
    .msg-group.ai .bubble { background: var(--chat-ai); border: 1px solid var(--border); color: var(--text); border-bottom-left-radius: 4px; backdrop-filter: blur(10px); }

    .tip-box {
      background: var(--tip-bg); border: 1px solid var(--tip-border); border-radius: 12px;
      padding: 12px 16px; font-size: 14px; color: var(--tip-text);
      display: flex; gap: 12px; align-items: flex-start; max-width: 400px;
      box-shadow: 0 4px 15px rgba(245, 158, 11, 0.05);
    }
    .tip-box i { width: 20px; height: 20px; flex-shrink: 0; color: #f59e0b; }
    .tip-content { line-height: 1.5; font-weight: 500; }

    .action-row { display: flex; gap: 8px; margin-top: 4px; }
    .btn-small {
      display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px;
      font-size: 12px; color: var(--text-muted); transition: all 0.2s;
    }
    .btn-small:hover { background: rgba(139, 92, 246, 0.1); color: var(--primary); border-color: rgba(139, 92, 246, 0.3); }
    .btn-small i { width: 14px; height: 14px; }

    .typing-indicator {
      display: flex; gap: 4px; padding: 16px 20px; background: var(--chat-ai);
      border: 1px solid var(--border); border-radius: 20px; border-bottom-left-radius: 4px;
      width: fit-content;
    }
    .typing-indicator span { width: 6px; height: 6px; background: var(--primary); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

    /* Input Area */
    .input-area {
      padding: 20px 24px; background: rgba(15, 23, 42, 0.8); border-top: 1px solid var(--border); flex-shrink: 0;
      display: flex; align-items: flex-end; gap: 12px; backdrop-filter: blur(20px);
    }
    .input-box {
      flex: 1; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--border);
      border-radius: 20px; padding: 14px 20px; display: flex; align-items: flex-end; gap: 10px;
      transition: border-color 0.2s;
    }
    .input-box:focus-within { border-color: var(--primary); background: rgba(255, 255, 255, 0.08); }
    
    #msg-input {
      flex: 1; background: transparent; border: none; color: var(--text);
      font-size: 15px; font-family: 'Inter', sans-serif; resize: none; max-height: 120px;
      line-height: 1.5; outline: none; padding: 0;
    }
    #msg-input::placeholder { color: var(--text-muted); }

    .btn-round {
      width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.2s; color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    .btn-mic { background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: var(--text); }
    .btn-mic:hover { background: rgba(255,255,255,0.15); }
    .btn-mic.listening {
      background: rgba(239, 68, 68, 0.2); border-color: rgba(239, 68, 68, 0.5); color: #ef4444;
      animation: pulse-mic 1.5s infinite;
    }
    @keyframes pulse-mic { 0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
    
    .btn-send { background: linear-gradient(135deg, var(--primary), var(--secondary)); opacity: 0.5; pointer-events: none; }
    .btn-send.active { opacity: 1; pointer-events: auto; }
    .btn-send.active:hover { transform: translateY(-2px); box-shadow: 0 6px 15px rgba(139, 92, 246, 0.4); }
    .btn-send.active:active { transform: translateY(0); }
    .btn-round i { width: 20px; height: 20px; }
    .btn-send i { margin-left: 2px; }

    /* Toast */
    #toast {
      position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
      background: var(--danger); color: #fff; padding: 12px 24px; border-radius: 12px;
      font-size: 14px; font-weight: 500; box-shadow: 0 10px 25px rgba(239, 68, 68, 0.4);
      display: flex; align-items: center; gap: 10px; transition: bottom 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      z-index: 100;
    }
    #toast.show { bottom: 30px; }
    #toast i { width: 18px; height: 18px; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

    @media (max-width: 768px) {
      .setup-card { padding: 30px 20px; }
      header { padding: 12px 16px; }
      #topics-section { padding: 24px 16px; }
      #messages { padding: 16px; }
      .input-area { padding: 16px; }
      .msg-group { max-width: 90%; }
      #app-screen { border: none; }
    }
  </style>
</head>
<body>

  <!-- Background Animated Blobs -->
  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <!-- Setup Screen -->
  <div id="setup-screen">
    <div class="setup-card">
      <div class="setup-header">
        <div class="setup-avatar">
          <i data-lucide="sparkles"></i>
        </div>
        <h1>IAninha Teacher</h1>
        <p>Your AI-powered English Tutor</p>
      </div>
      
      <p style="text-align: center; font-size: 13px; color: var(--text-muted); margin-bottom: 20px;">
        Provide at least one API key to start.
      </p>

      <div class="input-group">
        <label>Groq API Key <span class="badge groq">Fastest</span></label>
        <div class="input-wrapper">
          <i data-lucide="key"></i>
          <input type="password" id="groq-key" class="setup-input" placeholder="gsk_..." autocomplete="off" />
        </div>
      </div>
      
      <div class="input-group">
        <label>OpenRouter Key <span class="badge openrouter">Recommended</span></label>
        <div class="input-wrapper">
          <i data-lucide="key"></i>
          <input type="password" id="openrouter-key" class="setup-input" placeholder="sk-or-v1-..." autocomplete="off" />
        </div>
        <div class="setup-hint">Uses Llama 3.3 70B. Get key: <a href="https://openrouter.ai/keys" target="_blank">openrouter.ai</a></div>
      </div>
      
      <div class="input-group">
        <label>Google AI Studio Key <span class="badge gemini">Fallback</span></label>
        <div class="input-wrapper">
          <i data-lucide="key"></i>
          <input type="password" id="google-key" class="setup-input" placeholder="AIza..." autocomplete="off" />
        </div>
      </div>
      
      <button class="btn-primary" onclick="startApp()">
        <span>Start Learning</span>
        <i data-lucide="arrow-right"></i>
      </button>
    </div>
  </div>

  <!-- App Screen -->
  <div id="app-screen">
    <header>
      <div class="header-info">
        <div class="header-avatar" id="lily-avatar">
          <div class="teacher-face">
            <div class="face-eye left"></div>
            <div class="face-eye right"></div>
            <div class="face-blush left"></div>
            <div class="face-blush right"></div>
            <div class="face-mouth"></div>
          </div>
        </div>
        <div class="header-text">
          <h2>IAninha</h2>
          <div class="header-status">
            <div class="status-dot"></div>
            <span id="status-text">Ready to practice</span>
          </div>
        </div>
      </div>
      <div class="header-actions">
        <span class="btn-icon-text" id="provider-badge" title="Current AI Provider">
          <i data-lucide="zap"></i> <span id="provider-name">Groq</span>
        </span>
        <button class="btn-icon-text" onclick="resetChat()" title="Start New Conversation">
          <i data-lucide="refresh-cw"></i> <span>Reset</span>
        </button>
      </div>
    </header>

    <!-- Topics Section -->
    <div id="topics-section">
      <div class="topics-header">
        <h3>Hi! I'm IAninha 👋</h3>
        <p>Choose a topic to start practicing your English</p>
      </div>
      <div class="topics-grid" id="topics-grid">
        <!-- Topics will be injected here -->
      </div>
    </div>

    <!-- Chat Section -->
    <div id="chat-section">
      <div class="active-topic-bar">
        <i data-lucide="hash"></i> <span id="topic-label">Conversation</span>
      </div>
      
      <div id="messages">
        <!-- Messages will appear here -->
      </div>
      
      <div class="input-area">
        <div class="input-box">
          <textarea id="msg-input" rows="1" placeholder="Type in English or Portuguese..."></textarea>
        </div>
        <button class="btn-round btn-mic" id="mic-btn" title="Speak" onclick="toggleMic()">
          <i data-lucide="mic" id="mic-icon"></i>
        </button>
        <button class="btn-round btn-send" id="send-btn" title="Send" onclick="sendMessage()">
          <i data-lucide="send"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Error Toast -->
  <div id="toast">
    <i data-lucide="alert-circle"></i>
    <span id="toast-msg">Error message</span>
  </div>

  <script>
    // Initialize Lucide icons
    lucide.createIcons();

    const TOPICS = [
      { icon:"briefcase", label:"Job Interviews", prompt:"Let's practice for a job interview in English. Ask me one common question and wait for my answer." },
      { icon:"plane", label:"Travel", prompt:"Let's practice travel English — airports, hotels, asking for directions. Create a scenario and start." },
      { icon:"coffee", label:"Daily Life", prompt:"Let's have a casual everyday conversation in English. Start naturally." },
      { icon:"mail", label:"Business Email", prompt:"Help me practice writing professional emails in English. Give me a situation to respond to." },
      { icon:"message-square", label:"Free Talk", prompt:"Let's have a free conversation so I can practice my English naturally. Start with something interesting." },
      { icon:"book-open", label:"Grammar Focus", prompt:"I want to improve my English grammar. Focus on common mistakes Brazilian Portuguese speakers make. Start with one topic." },
      { icon:"film", label:"Movies & Pop", prompt:"Let's talk about movies, series or pop culture in English. Ask me about something." },
      { icon:"monitor", label:"Tech & Work", prompt:"Let's practice English for the tech/IT workplace — meetings, presentations, messages. Start with a scenario." },
    ];

    const SYSTEM_PROMPT = `You are IAninha, a warm, encouraging, and patient English conversation teacher. Your student is a Brazilian Portuguese speaker learning English.

Rules:
- Always respond in English
- If the student writes in Portuguese, understand it and reply in English
- Keep responses conversational (2-4 sentences unless explaining grammar)
- Correct mistakes SOFTLY — reuse the correct form naturally without embarrassing the student
- Occasionally include ONE grammar/vocabulary tip using exactly: [TIP: your tip here]
- Always ask a follow-up question to keep the conversation going
- Be warm, encouraging, and celebrate effort`;

    let groqKey = '', googleKey = '', openrouterKey = '';
    let messages = [];
    let isLoading = false, isListening = false;
    let recognition = null;
    let activeProvider = 'Groq';

    // Auto-resize textarea
    const msgInput = document.getElementById('msg-input');
    const sendBtn = document.getElementById('send-btn');
    
    msgInput.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
      if(this.value.trim().length > 0) {
        sendBtn.classList.add('active');
      } else {
        sendBtn.classList.remove('active');
      }
    });

    msgInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if(this.value.trim().length > 0) sendMessage();
      }
    });

    window.onload = () => {
      const sg = localStorage.getItem('ianinha_groq');
      const sk = localStorage.getItem('ianinha_google');
      const so = localStorage.getItem('ianinha_openrouter');
      
      if (sg) document.getElementById('groq-key').value = sg;
      if (sk) document.getElementById('google-key').value = sk;
      if (so) document.getElementById('openrouter-key').value = so;
      buildTopics();
      
      // Load voices
      if(window.speechSynthesis) {
        window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
      }
    };

    function startApp() {
      groqKey = document.getElementById('groq-key').value.trim();
      googleKey = document.getElementById('google-key').value.trim();
      openrouterKey = document.getElementById('openrouter-key').value.trim();
      
      if (!groqKey && !googleKey && !openrouterKey) {
        showToast('Please provide at least one API key to continue.');
        return;
      }
      
      localStorage.setItem('ianinha_groq', groqKey);
      localStorage.setItem('ianinha_google', googleKey);
      localStorage.setItem('ianinha_openrouter', openrouterKey);
      
      if (openrouterKey) activeProvider = 'OpenRouter';
      if (googleKey) activeProvider = 'Google';
      if (groqKey) activeProvider = 'Groq';
      
      document.getElementById('provider-name').textContent = activeProvider;
      
      document.getElementById('setup-screen').style.opacity = '0';
      setTimeout(() => {
        document.getElementById('setup-screen').style.display = 'none';
        document.getElementById('app-screen').style.display = 'flex';
      }, 400);
    }

    function buildTopics() {
      const grid = document.getElementById('topics-grid');
      grid.innerHTML = '';
      
      TOPICS.forEach(t => {
        const card = document.createElement('div');
        card.className = 'topic-card';
        card.onclick = () => startChat(t.label, t.prompt);
        
        card.innerHTML = `
          <div class="topic-icon">
            <i data-lucide="${t.icon}"></i>
          </div>
          <span>${t.label}</span>
        `;
        grid.appendChild(card);
      });
      lucide.createIcons();
    }

    async function startChat(label, prompt) {
      document.getElementById('topics-section').style.display = 'none';
      document.getElementById('chat-section').style.display = 'flex';
      document.getElementById('topic-label').textContent = label;
      
      messages = [{ role:'user', content:prompt, hidden:true }];
      
      setStatus('Thinking...');
      showTyping();
      isLoading = true;
      
      try {
        const reply = await callAI(messages);
        
        messages.push({ role:'assistant', content:reply });
        appendMessage('assistant', reply);
        
        speak(stripTip(reply));
      } catch (e) {
        console.error('Error in startChat:', e);
        showToast('Unexpected error communicating with AI.');
      } finally {
        hideTyping();
        isLoading = false;
        setStatus('Ready to practice');
      }
    }

    async function sendMessage() {
      if (isLoading) return;
      const text = msgInput.value.trim();
      if (!text) return;
      
      msgInput.value = '';
      msgInput.style.height = 'auto';
      sendBtn.classList.remove('active');
      
      messages.push({ role:'user', content:text });
      appendMessage('user', text);
      
      isLoading = true;
      setStatus('Thinking...');
      showTyping();
      
      const history = messages.filter(m => !m.hidden).map(m => ({ role:m.role, content:m.content }));
      
      try {
        const reply = await callAI(history);
        
        messages.push({ role:'assistant', content:reply });
        appendMessage('assistant', reply);
        
        speak(stripTip(reply));
      } catch (e) {
        console.error('Error in sendMessage:', e);
        showToast('Unexpected error communicating with AI.');
      } finally {
        hideTyping();
        isLoading = false;
        setStatus('Ready to practice');
      }
    }

    async function callAI(history) {
      // 1. Try Groq
      if (groqKey) {
        try {
          activeProvider = 'Groq';
          document.getElementById('provider-name').textContent = activeProvider;
          return await callGroq(history);
        } catch(e) {
          console.warn('Groq failed:', e);
        }
      }
      
      // 2. Try OpenRouter Fallback
      if (openrouterKey) {
        try {
          activeProvider = 'OpenRouter (fallback)';
          document.getElementById('provider-name').textContent = activeProvider;
          return await callOpenRouter(history);
        } catch(e) {
          console.warn('OpenRouter failed:', e);
        }
      }
      
      // 3. Try Google Fallback
      if (googleKey) {
        try {
          activeProvider = 'Google (fallback)';
          document.getElementById('provider-name').textContent = activeProvider;
          return await callGoogle(history);
        } catch(e) {
          console.warn('Google failed:', e);
        }
      }
      
      showToast('All configured APIs failed. Check your keys or connection.');
      throw new Error("All APIs failed");
    }

    async function callGroq(history) {
      const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
        method:'POST',
        headers:{ 'Content-Type':'application/json', 'Authorization':`Bearer ${groqKey}` },
        body: JSON.stringify({ 
          model:'llama-3.3-70b-versatile', 
          messages:[{ role:'system', content:SYSTEM_PROMPT }, ...history], 
          max_tokens:600, 
          temperature:0.7 
        })
      });
      if (!res.ok) throw new Error(`Groq HTTP ${res.status}`);
      const d = await res.json();
      return d.choices[0].message.content;
    }

    async function callOpenRouter(history) {
      const res = await fetch('https://openrouter.ai/api/v1/chat/completions', {
        method:'POST',
        headers:{ 
          'Content-Type':'application/json', 
          'Authorization':`Bearer ${openrouterKey}`,
          'HTTP-Referer': window.location.href,
          'X-Title': 'IAninha Teacher'
        },
        body: JSON.stringify({ 
          model:'meta-llama/llama-3.3-70b-instruct:free', 
          messages:[{ role:'system', content:SYSTEM_PROMPT }, ...history], 
          max_tokens:600, 
          temperature:0.7 
        })
      });
      if (!res.ok) throw new Error(`OpenRouter HTTP ${res.status}`);
      const d = await res.json();
      if (!d.choices || d.choices.length === 0) throw new Error("Empty OpenRouter response");
      return d.choices[0].message.content;
    }

    async function callGoogle(history) {
      // Gemini strict alternating roles workaround: Merge contiguous roles or handle gracefully.
      // Basic mapping: user->user, assistant->model
      const contents = history.map(m => ({ 
        role: m.role === 'assistant' ? 'model' : 'user', 
        parts:[{ text: m.content }] 
      }));
      
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${googleKey}`, {
        method:'POST',
        headers:{ 'Content-Type':'application/json' },
        body: JSON.stringify({ 
          system_instruction:{ parts:[{ text:SYSTEM_PROMPT }] }, 
          contents, 
          generationConfig:{ maxOutputTokens:600, temperature:0.7 } 
        })
      });
      if (!res.ok) throw new Error(`Google HTTP ${res.status}`);
      const d = await res.json();
      if(!d.candidates || d.candidates.length === 0) throw new Error("Oops, no response from Gemini.");
      return d.candidates[0].content.parts[0].text;
    }

    function appendMessage(role, content) {
      const msgs = document.getElementById('messages');
      const isUser = role === 'user';
      
      let mainText = content, tip = null;
      if (!isUser) {
        const m = content.match(/\[TIP:\s*(.*?)\]/s);
        if (m) {
          tip = m[1].trim();
          mainText = content.replace(/\[TIP:\s*.*?\]/s,'').trim();
        }
      }
      
      const group = document.createElement('div');
      group.className = `msg-group ${isUser ? 'user' : 'ai'}`;
      
      const av = document.createElement('div');
      av.className = 'msg-avatar';
      av.innerHTML = isUser ? '<i data-lucide="user"></i>' : '<i data-lucide="bot"></i>';
      
      const col = document.createElement('div');
      col.className = 'msg-content';
      
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.textContent = mainText;
      col.appendChild(bubble);
      
      if (tip) {
        const tipEl = document.createElement('div');
        tipEl.className = 'tip-box';
        tipEl.innerHTML = `<i data-lucide="lightbulb"></i><div class="tip-content">${tip}</div>`;
        col.appendChild(tipEl);
      }
      
      if (!isUser) {
        const actionRow = document.createElement('div');
        actionRow.className = 'action-row';
        
        const lb = document.createElement('button');
        lb.className = 'btn-small';
        lb.innerHTML = '<i data-lucide="volume-2"></i> Listen';
        lb.onclick = () => speak(mainText);
        
        actionRow.appendChild(lb);
        col.appendChild(actionRow);
      }
      
      group.appendChild(av);
      group.appendChild(col);
      msgs.appendChild(group);
      
      lucide.createIcons();
      scrollToBottom();
    }

    let typingEl = null;
    function showTyping() {
      const msgs = document.getElementById('messages');
      const group = document.createElement('div');
      group.className = 'msg-group ai';
      group.id = 'typing-indicator-wrapper';
      
      const av = document.createElement('div');
      av.className = 'msg-avatar';
      av.innerHTML = '<i data-lucide="bot"></i>';
      
      const dots = document.createElement('div');
      dots.className = 'typing-indicator';
      dots.innerHTML = '<span></span><span></span><span></span>';
      
      group.appendChild(av);
      group.appendChild(dots);
      msgs.appendChild(group);
      
      lucide.createIcons();
      typingEl = group;
      scrollToBottom();
    }
    
    function hideTyping() {
      if (typingEl) { typingEl.remove(); typingEl = null; }
    }

    function scrollToBottom() {
      const msgs = document.getElementById('messages');
      msgs.scrollTop = msgs.scrollHeight;
    }

    function speak(text) {
      if (!text || !window.speechSynthesis) return;
      const synth = window.speechSynthesis;
      synth.cancel();
      
      const utt = new SpeechSynthesisUtterance(text);
      utt.lang = 'en-US';
      utt.rate = 0.95;
      utt.pitch = 1.0;
      
      const voices = synth.getVoices();
      const preferred = voices.find(v => v.lang.startsWith('en-US') && (v.name.includes('Samantha') || v.name.includes('Google US English'))) 
                     || voices.find(v => v.lang.startsWith('en'));
      if (preferred) utt.voice = preferred;
      
      utt.onstart = () => { 
        document.getElementById('lily-avatar').classList.add('speaking');
        setStatus('Speaking...'); 
      };
      utt.onend = () => { 
        document.getElementById('lily-avatar').classList.remove('speaking');
        setStatus('Ready to practice'); 
      };
      utt.onerror = () => {
        document.getElementById('lily-avatar').classList.remove('speaking');
        setStatus('Ready to practice');
      };
      
      synth.speak(utt);
    }

    function stripTip(t) {
      return t.replace(/\[TIP:\s*.*?\]/s,'').trim();
    }

    function toggleMic() {
      isListening ? stopMic() : startMic();
    }
    
    function startMic() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { 
        showToast('Speech recognition is not supported in this browser. Try Chrome.');
        return; 
      }
      
      try {
        recognition = new SR();
        recognition.lang = 'en-US';
        recognition.interimResults = false;
        
        recognition.onstart = () => {
          isListening = true;
          document.getElementById('mic-btn').classList.add('listening');
          document.getElementById('mic-icon').setAttribute('data-lucide', 'square');
          lucide.createIcons();
          setStatus('Listening...');
        };
        
        recognition.onresult = e => {
          const t = e.results[0][0].transcript;
          msgInput.value += (msgInput.value ? ' ' : '') + t;
          msgInput.dispatchEvent(new Event('input')); // Trigger resize and button state
        };
        
        recognition.onerror = e => {
          console.error('Speech recognition error', e);
          if(e.error !== 'no-speech') showToast('Microphone error: ' + e.error);
          stopMic();
        };
        
        recognition.onend = () => {
          stopMic();
        };
        
        recognition.start();
      } catch (e) {
        console.error(e);
        stopMic();
      }
    }
    
    function stopMic() {
      if (recognition) {
        try { recognition.stop(); } catch(e) {}
        recognition = null;
      }
      isListening = false;
      const micBtn = document.getElementById('mic-btn');
      micBtn.classList.remove('listening');
      document.getElementById('mic-icon').setAttribute('data-lucide', 'mic');
      lucide.createIcons();
      setStatus('Ready to practice');
    }

    function setStatus(t) {
      document.getElementById('status-text').textContent = t;
    }
    
    function showToast(msg) {
      const toast = document.getElementById('toast');
      document.getElementById('toast-msg').textContent = msg;
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 4000);
    }
    
    function resetChat() {
      if(window.speechSynthesis) window.speechSynthesis.cancel();
      stopMic();
      messages = [];
      document.getElementById('messages').innerHTML = '';
      document.getElementById('chat-section').style.display = 'none';
      document.getElementById('topics-section').style.display = 'block';
      msgInput.value = '';
      msgInput.dispatchEvent(new Event('input'));
      setStatus('Ready to practice');
    }
  </script>
</body>
</html>
